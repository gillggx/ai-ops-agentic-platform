apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: aiops
spec:
  clusterIP: None        # headless — stable per-pod DNS
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    app: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: aiops
spec:
  serviceName: postgres
  replicas: 1            # single-writer; HA needs operator (out of scope)
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg17
          ports: [{containerPort: 5432}]
          env:
            - {name: POSTGRES_DB, value: aiops_db}
            - {name: POSTGRES_USER, value: aiops}
            - name: POSTGRES_PASSWORD
              valueFrom: {secretKeyRef: {name: aiops-secrets, key: POSTGRES_PASSWORD}}
          volumeMounts:
            - {name: data, mountPath: /var/lib/postgresql/data}
          readinessProbe:
            exec:
              command: [sh, -c, "pg_isready -U aiops -d aiops_db"]
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: {cpu: "200m", memory: "512Mi"}
            limits:   {cpu: "1000m", memory: "2Gi"}
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 20Gi
