apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: aiops
spec:
  clusterIP: None
  ports:
    - port: 27017
      targetPort: 27017
  selector:
    app: mongodb
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: aiops
spec:
  serviceName: mongodb
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7
          ports: [{containerPort: 27017}]
          volumeMounts:
            - {name: data, mountPath: /data/db}
          readinessProbe:
            exec:
              command: [mongosh, --quiet, --eval, "db.adminCommand('ping').ok"]
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: {cpu: "200m", memory: "512Mi"}
            limits:   {cpu: "1000m", memory: "2Gi"}
  volumeClaimTemplates:
    - metadata: {name: data}
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
