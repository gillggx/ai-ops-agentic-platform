# Example secret manifests. DO NOT commit real values. Create with:
#
#   kubectl -n aiops create secret generic aiops-secrets \
#     --from-literal=INTERNAL_API_TOKEN=$(openssl rand -hex 32) \
#     --from-literal=NEXTAUTH_SECRET=$(openssl rand -base64 32) \
#     --from-literal=POSTGRES_PASSWORD=$(openssl rand -hex 16)
#
#   kubectl -n aiops create secret generic aiops-secrets-llm \
#     --from-literal=ANTHROPIC_API_KEY=sk-ant-...
#
# Or use your secret manager (Vault / SealedSecrets / ExternalSecrets).
# This file is illustrative only.
---
apiVersion: v1
kind: Secret
metadata:
  name: aiops-secrets
  namespace: aiops
type: Opaque
stringData:
  INTERNAL_API_TOKEN: "REPLACE_ME_openssl_rand_hex_32"
  NEXTAUTH_SECRET: "REPLACE_ME_openssl_rand_base64_32"
  POSTGRES_PASSWORD: "REPLACE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: aiops-secrets-llm
  namespace: aiops
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"
