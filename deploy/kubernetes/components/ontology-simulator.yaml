apiVersion: v1
kind: Service
metadata:
  name: ontology-simulator
  namespace: aiops
spec:
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: ontology-simulator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ontology-simulator
  namespace: aiops
spec:
  replicas: 1            # Stateful sim — single instance to keep MES state.
  selector:
    matchLabels: {app: ontology-simulator}
  template:
    metadata:
      labels: {app: ontology-simulator}
    spec:
      containers:
        - name: ontology-simulator
          image: ghcr.io/gillggx/aiops-ontology-simulator:latest
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8080}]
          envFrom:
            - configMapRef: {name: aiops-config}
          env:
            - {name: PORT, value: "8080"}
          readinessProbe:
            httpGet: {path: /api/v1/tools, port: 8080}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /api/v1/tools, port: 8080}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: {cpu: "100m", memory: "256Mi"}
            limits:   {cpu: "500m", memory: "512Mi"}
