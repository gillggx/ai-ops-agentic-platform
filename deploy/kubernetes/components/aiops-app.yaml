apiVersion: v1
kind: Service
metadata:
  name: aiops-app
  namespace: aiops
spec:
  # NodePort for the simplest external access on a single-cluster install.
  # Prod should swap to LoadBalancer or Ingress — see docs/deploy-kubernetes.md.
  type: NodePort
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30800
  selector:
    app: aiops-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-app
  namespace: aiops
spec:
  replicas: 2
  selector:
    matchLabels: {app: aiops-app}
  template:
    metadata:
      labels: {app: aiops-app}
    spec:
      containers:
        - name: aiops-app
          image: ghcr.io/gillggx/aiops-app:latest
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8080}]
          envFrom:
            - configMapRef: {name: aiops-config}
            - secretRef: {name: aiops-secrets}
          env:
            - {name: PORT, value: "8080"}
            - {name: NEXTAUTH_URL, value: "http://aiops-app.example.com"}    # change per cluster
          readinessProbe:
            httpGet: {path: /api/health, port: 8080}
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /api/health, port: 8080}
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests: {cpu: "100m", memory: "256Mi"}
            limits:   {cpu: "500m", memory: "512Mi"}
