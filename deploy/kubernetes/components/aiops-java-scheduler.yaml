apiVersion: v1
kind: Service
metadata:
  name: aiops-java-scheduler
  namespace: aiops
spec:
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: aiops-java-scheduler
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-java-scheduler
  namespace: aiops
spec:
  # IMPORTANT: replicas=1 unless leader election is added.
  # Cron job dedup uses Redis SET NX; only one pod should fire schedules.
  # See docs/scheduler-job-coordination.md.
  replicas: 1
  strategy:
    # Avoid two pods running simultaneously during rollout. Recreate guarantees
    # the old pod is gone before the new one starts.
    type: Recreate
  selector:
    matchLabels: {app: aiops-java-scheduler}
  template:
    metadata:
      labels: {app: aiops-java-scheduler}
    spec:
      containers:
        - name: aiops-java-scheduler
          image: ghcr.io/gillggx/aiops-java-scheduler:latest
          imagePullPolicy: IfNotPresent
          ports: [{containerPort: 8080}]
          envFrom:
            - configMapRef: {name: aiops-config}
            - secretRef: {name: aiops-secrets}
          env:
            - {name: PORT, value: "8080"}
            - {name: AIOPS_JAVA_API_INTERNAL_TOKEN, valueFrom: {secretKeyRef: {name: aiops-secrets, key: INTERNAL_API_TOKEN}}}
          readinessProbe:
            httpGet: {path: /actuator/health, port: 8080}
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /actuator/health, port: 8080}
            initialDelaySeconds: 60
            periodSeconds: 30
          # Graceful shutdown: give in-flight jobs 30s to finish before SIGKILL.
          lifecycle:
            preStop:
              exec: {command: [sh, -c, "sleep 5"]}
          resources:
            requests: {cpu: "100m", memory: "384Mi"}
            limits:   {cpu: "500m", memory: "768Mi"}
      terminationGracePeriodSeconds: 30
