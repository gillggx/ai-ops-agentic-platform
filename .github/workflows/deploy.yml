name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 執行遠端 SSH 部署指令
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "=== 開始部署 ==="

            REPO_ROOT="$HOME/ai-ops-agentic-platform"
            BE_DIR="$REPO_ROOT/fastapi_backend_service"
            VENV="$REPO_ROOT/venv/bin/activate"
            SERVICE_FILE="/etc/systemd/system/aiops.service"

            # ── 1. Git pull ────────────────────────────────────────────────
            echo "--- [1/4] 拉取最新程式碼 ---"
            cd "$REPO_ROOT"
            mv "$BE_DIR/dev.db" /tmp/devdb_bak.db 2>/dev/null || true
            git pull origin main
            cp /tmp/devdb_bak.db "$BE_DIR/dev.db" 2>/dev/null || true

            # ── 2. 前端打包 ────────────────────────────────────────────────
            echo "--- [2/4] 打包前端 ---"
            cd "$REPO_ROOT/frontend"
            npm install
            npm run build

            # ── 3. Python 依賴 + DB migration ─────────────────────────────
            echo "--- [3/4] 安裝依賴 & DB migration ---"
            source "$VENV"
            pip install -r "$BE_DIR/requirements.txt"
            cd "$BE_DIR"
            alembic upgrade head

            # ── 4. 重啟後端 (systemd) ──────────────────────────────────────
            echo "--- [4/4] 重啟後端服務 ---"

            printf '%s\n' \
              '[Unit]' \
              'Description=AIOps FastAPI Backend' \
              'After=network.target' \
              '' \
              '[Service]' \
              "User=$USER" \
              "WorkingDirectory=$BE_DIR" \
              "ExecStart=$REPO_ROOT/venv/bin/uvicorn main:app --host 0.0.0.0 --port 8000" \
              'Restart=always' \
              'RestartSec=5' \
              'StandardOutput=journal' \
              'StandardError=journal' \
              '' \
              '[Install]' \
              'WantedBy=multi-user.target' \
              | sudo tee "$SERVICE_FILE" > /dev/null

            sudo systemctl daemon-reload
            sudo systemctl enable aiops.service
            sudo systemctl restart aiops.service
            sleep 2
            sudo systemctl status aiops.service --no-pager

            echo "=== 部署完成！==="
