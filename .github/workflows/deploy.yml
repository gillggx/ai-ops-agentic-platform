name: Deploy to Production (AWS EC2)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (for changed-files detection)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need previous commit to diff

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.EC2_HOST }}
          username:    ${{ secrets.EC2_USERNAME }}
          key:         ${{ secrets.EC2_SSH_KEY }}
          request_pty: true
          script: |
            set -e
            echo "=== [1/1] Running update.sh on /opt/aiops ==="

            cd /opt/aiops

            # Ensure remote uses SSH (not HTTPS) so git pull works without credentials
            git remote set-url origin git@github.com:gillggx/ai-ops-agentic-platform.git

            bash deploy/update.sh --rebuild-frontend

            echo "=== Deploy complete ==="
