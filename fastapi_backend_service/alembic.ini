# Alembic configuration file
# Reference: https://alembic.sqlalchemy.org/en/latest/tutorial.html

[alembic]
# Path to migration scripts directory
script_location = alembic

# Template for migration file names
# Default: %%(rev)s_%%(slug)s
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for timestamps in migration file names (default: UTC)
# timezone = UTC

# Maximum length of slug in migration file names
# truncate_slug_length = 40

# sys.path extension
# prepend_sys_path = .

# version_path_separator: use os, slash, backslash, or colon (default: os)
version_path_separator = os

# Database URL — overridden at runtime by env.py which reads from app config.
# Leave as empty string here; env.py will inject the real URL.
sqlalchemy.url =

[post_write_hooks]
# Post-write hooks to run after generating migration files.
# Example: run ruff and isort
# hooks = ruff, isort
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = check --fix REVISION_SCRIPT_FILENAME
# isort.type = exec
# isort.executable = isort
# isort.options = REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
